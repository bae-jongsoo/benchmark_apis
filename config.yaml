test_duration: 40        # 초
concurrent_users: 1000
rampup_seconds: 10       # k6 stages: 0→VUs 도달 시간
warmup_seconds: 5

server_configs:
  - name: django-4w
    framework: django
    workers: 4
    port: 8001
  - name: django-16w
    framework: django
    workers: 16
    port: 8003
  - name: fastapi-2w
    framework: fastapi
    workers: 2
    port: 8011
  - name: fastapi-4w
    framework: fastapi
    workers: 4
    port: 8012
  - name: fastapi-4w-async
    framework: fastapi
    workers: 4
    port: 8014
    cpu_handler: async
  - name: spring-default
    framework: spring
    port: 8031
    tomcat_max_threads: 200
  - name: spring-4t
    framework: spring
    port: 8032
    tomcat_max_threads: 4

# Phase별 앱 컨테이너 CPU 코어 제한
phase_cpus:
  phase1: "4"
  phase2: "4"
  phase3: "4"

# Phase 1: CPU-bound (4코어)
phase1_scenarios:
  cpu_bound:
    - django-4w
    - django-16w
    - fastapi-2w
    - fastapi-4w
    - fastapi-4w-async
    - spring-default
    - spring-4t

# Phase 2: IO-bound (4코어)
phase2_scenarios:
  io_bound:
    - django-4w
    - django-16w
    - fastapi-2w
    - fastapi-4w
    - spring-default
    - spring-4t

# Phase 3: Fake IO — 5ms sleep + 직렬화 (4코어)
phase3_scenarios:
  fake_io:
    - django-4w
    - django-16w
    - fastapi-2w
    - fastapi-4w
    - spring-default
    - spring-4t
