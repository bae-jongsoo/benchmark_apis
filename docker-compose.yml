services:
  django-app:
    build:
      context: .
      dockerfile: django_app/Dockerfile
    environment:
      - WORKERS=${WORKERS:-4}
      - WORKER_CLASS=${WORKER_CLASS:-sync}
      - THREADS=${THREADS:-1}
      - DB_HOST=host.docker.internal
      - DB_PORT=5432
      - DB_NAME=foodcommit
      - DB_USER=postgres
      - DB_PASSWORD=postgres
    ports:
      - "${APP_PORT:-8001}:8000"
    deploy:
      resources:
        limits:
          cpus: "${APP_CPUS:-2}"
          memory: 2G
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - bench-network

  fastapi-app:
    build:
      context: .
      dockerfile: fastapi_app/Dockerfile
    environment:
      - WORKERS=${WORKERS:-4}
      - CPU_HANDLER=${CPU_HANDLER:-sync}
      - POOL_SIZE=${POOL_SIZE:-20}
      - MAX_OVERFLOW=${MAX_OVERFLOW:-20}
      - DB_HOST=host.docker.internal
      - DB_PORT=5432
      - DB_NAME=foodcommit
      - DB_USER=postgres
      - DB_PASSWORD=postgres
    ports:
      - "${APP_PORT:-8011}:8000"
    deploy:
      resources:
        limits:
          cpus: "${APP_CPUS:-2}"
          memory: 2G
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - bench-network

  spring-app:
    build:
      context: .
      dockerfile: spring_app/Dockerfile
    environment:
      - TOMCAT_MAX_THREADS=${TOMCAT_MAX_THREADS:-200}
      - DB_HOST=host.docker.internal
      - DB_PORT=5432
      - DB_NAME=foodcommit
      - DB_USER=postgres
      - DB_PASSWORD=postgres
    ports:
      - "${APP_PORT:-8031}:8080"
    deploy:
      resources:
        limits:
          cpus: "${APP_CPUS:-2}"
          memory: 2G
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - bench-network

  k6:
    image: grafana/k6:latest
    volumes:
      - ./k6:/scripts
      - ./results:/results
    deploy:
      resources:
        limits:
          memory: 8G
    networks:
      - bench-network

networks:
  bench-network:
    driver: bridge
